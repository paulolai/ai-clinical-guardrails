version: '3.8'

services:
  whisper:
    build:
      context: ./whisper
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./models:/root/.cache/whisper  # Persist models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    volumes:
      - ./models:/root/.cache/huggingface  # Persist models
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 60s
      timeout: 30s
      retries: 3
