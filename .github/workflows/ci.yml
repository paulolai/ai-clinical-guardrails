name: AI Clinical Guardrails CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run daily at 2 AM UTC to validate cassettes
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      SYNTHETIC_API_KEY: ${{ secrets.SYNTHETIC_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install Dependencies
        run: uv sync

      - name: Run Tests
        run: uv run pytest tests/ -v

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            reports/
          retention-days: 30

  lint-and-typecheck:
    name: Run Linter and Type Checker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install Dependencies
        run: uv sync

      - name: Run Linter
        run: uv run ruff check .

      - name: Run Type Checker
        run: uv run mypy src/

  # Daily re-recording validation to detect API drift
  validate-cassettes:
    name: Validate Component Test Cassettes
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      SYNTHETIC_API_KEY: ${{ secrets.SYNTHETIC_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install Dependencies
        run: uv sync

      - name: Re-record Component Tests
        run: uv run pytest tests/component/ -v --record-mode=all --snapshot-update

      - name: Analyze Changes
        id: analyze
        run: |
          # Check if there are any changes
          if git diff --quiet tests/component/cassettes/ tests/component/__snapshots__/; then
            echo "✅ No cassette or snapshot changes detected"
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          else
            echo "📝 Changes detected, analyzing with validation script..."
            echo "changes_detected=true" >> $GITHUB_OUTPUT

            # Show stats of what changed
            echo "\n📊 Cassette Changes:"
            git diff --stat tests/component/cassettes/ || true
            echo "\n📊 Snapshot Changes:"
            git diff --stat tests/component/__snapshots__/ || true
          fi

      - name: Validate Changes with LLM
        if: steps.analyze.outputs.changes_detected == 'true'
        id: validate
        run: uv run python scripts/validate_cassettes.py
        env:
          SYNTHETIC_API_KEY: ${{ secrets.SYNTHETIC_API_KEY }}

      - name: Upload Change Artifacts
        if: steps.analyze.outputs.changes_detected == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cassette-changes
          path: |
            tests/component/cassettes/
            tests/component/__snapshots__/

      - name: Check for Snapshot Changes
        run: |
          if git diff --quiet tests/component/__snapshots__/; then
            echo "✅ No snapshot changes detected"
          else
            echo "⚠️ Snapshot changes detected! Response structures may have changed."
            git diff --stat tests/component/__snapshots__/
            exit 1
          fi
